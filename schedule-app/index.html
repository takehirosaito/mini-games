<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Schedule App</title>
  <style>
    :root{--bg:#f6f7fb;--card:#fff;--text:#182033;--muted:#667085;--line:#dde3ee;--primary:#2563eb;--danger:#dc2626;--shadow:0 18px 45px rgba(24,32,51,.10);--radius:18px}
    *{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at 0 0,rgba(37,99,235,.18),transparent 34rem),var(--bg);color:var(--text)}
    button,input,select,textarea{font:inherit}button{border:0;border-radius:12px;padding:10px 13px;background:#eef2f7;color:var(--text);cursor:pointer}button:hover{filter:brightness(.98);transform:translateY(-1px)}.primary{background:var(--primary);color:white}.danger{background:#fee2e2;color:var(--danger)}.ghost{border:1px solid var(--line);background:white}
    .app{width:min(1380px,calc(100% - 28px));margin:22px auto;display:grid;grid-template-columns:1fr 370px;gap:18px}.hero{grid-column:1/-1;display:flex;justify-content:space-between;gap:14px;align-items:center;background:rgba(255,255,255,.88);border:1px solid white;border-radius:var(--radius);box-shadow:var(--shadow);padding:20px}.hero h1{margin:0 0 4px;font-size:clamp(28px,4vw,44px);letter-spacing:-.04em}.hero p{margin:0;color:var(--muted)}.actions{display:flex;gap:9px;flex-wrap:wrap;justify-content:flex-end}.card{background:rgba(255,255,255,.94);border:1px solid white;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}.bar{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:16px;border-bottom:1px solid var(--line)}.month{font-weight:850;font-size:24px;min-width:190px;text-align:center}.bar-group{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.filters{display:grid;grid-template-columns:1fr 150px;gap:10px;padding:13px 16px;border-bottom:1px solid var(--line);background:#fbfcff}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:10px 12px;background:white;color:var(--text);outline:none}textarea{min-height:86px;resize:vertical}input:focus,select:focus,textarea:focus{border-color:rgba(37,99,235,.65);box-shadow:0 0 0 4px rgba(37,99,235,.10)}.week,.grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr))}.week{padding:12px 16px 0;text-align:center;color:var(--muted);font-size:13px;font-weight:800}.grid{padding:14px 16px 16px;background:var(--line);gap:1px}.day{min-height:124px;background:white;padding:9px;display:flex;flex-direction:column;gap:7px;cursor:pointer;position:relative}.day:hover{background:#f8fbff}.day.other{color:#a8b1c0;background:#f8fafc}.day.selected{outline:3px solid rgba(37,99,235,.28);z-index:1}.date-line{display:flex;justify-content:space-between;gap:4px;align-items:center;font-weight:850}.today .num{display:inline-flex;min-width:28px;justify-content:center;padding:3px 8px;border-radius:99px;background:var(--primary);color:white}.count{font-size:12px;color:var(--muted);font-weight:700}.mini-wrap{display:grid;gap:6px}.mini{border-left:4px solid var(--primary);border-radius:10px;padding:6px 7px;background:#eef4ff;font-size:12px;line-height:1.35;display:grid;gap:1px}.mini time{font-weight:800;color:var(--muted);font-size:11px}.more{font-size:12px;color:var(--muted);font-weight:800}.side{display:grid;align-content:start;gap:18px}.panel{padding:17px}.panel h2{font-size:18px;margin:0 0 13px}.form{display:grid;gap:11px}.two{display:grid;grid-template-columns:1fr 1fr;gap:9px}label{display:grid;gap:6px;color:var(--muted);font-size:13px;font-weight:800}.form-actions{display:flex;gap:9px;flex-wrap:wrap}.date-label{color:var(--muted);margin:-6px 0 12px;font-size:14px}.list{display:grid;gap:10px}.event{border:1px solid var(--line);border-left:6px solid var(--primary);border-radius:16px;background:white;padding:12px;display:grid;gap:7px}.event-head{display:flex;justify-content:space-between;gap:8px}.title{font-weight:850;word-break:break-word}.meta,.memo{font-size:13px;color:var(--muted);line-height:1.5;white-space:pre-wrap;word-break:break-word}.tools{display:flex;gap:6px;flex-shrink:0}.tools button{font-size:12px;border-radius:9px;padding:6px 8px}.chip{display:inline-flex;width:max-content;border-radius:99px;background:#f1f5f9;padding:4px 9px;color:var(--muted);font-size:12px;font-weight:800}.empty{border:1px dashed var(--line);border-radius:16px;padding:18px;text-align:center;color:var(--muted);background:#fbfcff}.toast{position:fixed;left:50%;bottom:24px;transform:translate(-50%,16px);opacity:0;pointer-events:none;background:#111827;color:white;padding:12px 16px;border-radius:99px;box-shadow:var(--shadow);transition:.2s;z-index:5}.toast.show{opacity:1;transform:translate(-50%,0)}.cat-work{border-left-color:#2563eb;background:#eef4ff}.cat-private{border-left-color:#db2777;background:#fdf2f8}.cat-health{border-left-color:#16a34a;background:#f0fdf4}.cat-study{border-left-color:#9333ea;background:#faf5ff}.cat-other{border-left-color:#f97316;background:#fff7ed}.event.cat-work,.event.cat-private,.event.cat-health,.event.cat-study,.event.cat-other{background:white}
    @media(max-width:980px){.app{grid-template-columns:1fr}.hero{align-items:flex-start;flex-direction:column}.actions{justify-content:flex-start}}@media(max-width:720px){.app{width:min(100% - 18px,1380px);margin:10px auto;gap:12px}.hero,.panel,.bar{padding:14px}.bar{align-items:stretch;flex-direction:column}.month{text-align:left}.filters{grid-template-columns:1fr;padding:12px 14px}.week{padding:10px 10px 0;font-size:11px}.grid{padding:10px}.day{min-height:92px;padding:6px}.mini{font-size:11px;padding:5px 6px}.count{display:none}.two{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <div><h1>Schedule</h1><p>予定をブラウザに保存するシンプルなスケジュール管理アプリ</p></div>
      <div class="actions">
        <button id="exportJson" class="ghost" type="button">JSON出力</button>
        <button id="exportCsv" class="ghost" type="button">CSV出力</button>
        <button id="importBtn" class="ghost" type="button">JSON読込</button>
        <input id="importFile" type="file" accept="application/json,.json" hidden>
        <button id="clearAll" class="danger" type="button">全削除</button>
      </div>
    </section>

    <section class="card">
      <div class="bar">
        <div class="bar-group">
          <button id="prev" type="button">前月</button>
          <button id="today" class="ghost" type="button">今日</button>
        </div>
        <div id="monthTitle" class="month"></div>
        <div class="bar-group"><button id="next" type="button">翌月</button></div>
      </div>
      <div class="filters">
        <input id="search" type="search" placeholder="予定を検索">
        <select id="filter">
          <option value="all">全カテゴリ</option>
          <option value="work">仕事</option>
          <option value="private">プライベート</option>
          <option value="health">健康</option>
          <option value="study">学習</option>
          <option value="other">その他</option>
        </select>
      </div>
      <div class="week"><div>日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div></div>
      <div id="calendar" class="grid"></div>
    </section>

    <aside class="side">
      <section class="card panel">
        <h2 id="formTitle">予定を追加</h2>
        <form id="form" class="form">
          <label>タイトル<input id="title" maxlength="80" required placeholder="例：商談、撮影、ジム"></label>
          <label>日付<input id="date" type="date" required></label>
          <div class="two">
            <label>開始<input id="start" type="time"></label>
            <label>終了<input id="end" type="time"></label>
          </div>
          <label>カテゴリ<select id="category"><option value="work">仕事</option><option value="private">プライベート</option><option value="health">健康</option><option value="study">学習</option><option value="other">その他</option></select></label>
          <label>メモ<textarea id="memo" maxlength="600" placeholder="メモを入力"></textarea></label>
          <div class="form-actions"><button class="primary" id="save" type="submit">保存</button><button id="cancel" type="button" hidden>キャンセル</button></div>
        </form>
      </section>
      <section class="card panel">
        <h2>選択日の予定</h2>
        <div id="selectedLabel" class="date-label"></div>
        <div id="agenda" class="list"></div>
      </section>
      <section class="card panel">
        <h2>直近7日</h2>
        <div id="upcoming" class="list"></div>
      </section>
    </aside>
  </main>
  <div id="toast" class="toast"></div>

  <script>
    const STORAGE='schedule-app-events-v1';
    const labels={work:'仕事',private:'プライベート',health:'健康',study:'学習',other:'その他'};
    const $=id=>document.getElementById(id);
    const el={calendar:$('calendar'),month:$('monthTitle'),form:$('form'),formTitle:$('formTitle'),title:$('title'),date:$('date'),start:$('start'),end:$('end'),category:$('category'),memo:$('memo'),cancel:$('cancel'),search:$('search'),filter:$('filter'),selectedLabel:$('selectedLabel'),agenda:$('agenda'),upcoming:$('upcoming'),toast:$('toast'),importFile:$('importFile')};
    let events=load(), view=startOfMonth(new Date()), selected=fmt(new Date()), editing=null;
    el.date.value=selected;

    $('prev').onclick=()=>{view=new Date(view.getFullYear(),view.getMonth()-1,1);render()};
    $('next').onclick=()=>{view=new Date(view.getFullYear(),view.getMonth()+1,1);render()};
    $('today').onclick=()=>{const n=new Date();view=startOfMonth(n);selected=fmt(n);stopEdit(false);render()};
    $('exportJson').onclick=exportJson;$('exportCsv').onclick=exportCsv;$('importBtn').onclick=()=>el.importFile.click();el.importFile.onchange=importJson;$('clearAll').onclick=clearAll;
    el.search.oninput=render;el.filter.onchange=render;el.cancel.onclick=()=>stopEdit();

    el.form.onsubmit=e=>{
      e.preventDefault();
      const item={id:editing||id(),title:el.title.value.trim(),date:el.date.value,start:el.start.value,end:el.end.value,category:el.category.value,memo:el.memo.value.trim(),createdAt:new Date().toISOString()};
      if(!item.title||!item.date)return;
      selected=item.date;view=startOfMonth(parse(item.date));
      if(editing){events=events.map(x=>x.id===editing?{...x,...item,createdAt:x.createdAt}:x);toast('予定を更新しました')}else{events.push(item);toast('予定を保存しました')}
      save();stopEdit(false);render();
    };

    function render(){
      el.month.textContent=new Intl.DateTimeFormat('ja-JP',{year:'numeric',month:'long'}).format(view);
      el.date.value=selected;
      renderCalendar();renderAgenda();renderUpcoming();
    }
    function renderCalendar(){
      el.calendar.innerHTML='';
      const first=startOfMonth(view), start=new Date(first);start.setDate(first.getDate()-first.getDay());
      const today=fmt(new Date()), filtered=getFiltered();
      for(let i=0;i<42;i++){
        const d=new Date(start);d.setDate(start.getDate()+i);const key=fmt(d);
        const list=sort(filtered.filter(x=>x.date===key));
        const day=document.createElement('button');day.type='button';day.className='day'+(d.getMonth()!==view.getMonth()?' other':'')+(key===selected?' selected':'')+(key===today?' today':'');
        day.innerHTML=`<div class="date-line"><span class="num">${d.getDate()}</span><span class="count">${list.length?list.length+'件':''}</span></div><div class="mini-wrap"></div>`;
        const wrap=day.querySelector('.mini-wrap');
        list.slice(0,3).forEach(ev=>{const m=document.createElement('div');m.className='mini cat-'+(ev.category||'other');m.innerHTML=`<time>${time(ev)}</time><span>${esc(ev.title)}</span>`;m.onclick=a=>{a.stopPropagation();edit(ev.id)};wrap.appendChild(m)});
        if(list.length>3){const more=document.createElement('div');more.className='more';more.textContent=`+${list.length-3}件`;wrap.appendChild(more)}
        day.onclick=()=>{selected=key;stopEdit(false);render()};
        el.calendar.appendChild(day);
      }
    }
    function renderAgenda(){
      el.selectedLabel.textContent=jpDate(selected);el.agenda.innerHTML='';
      const list=sort(getFiltered().filter(x=>x.date===selected));
      if(!list.length){el.agenda.innerHTML='<div class="empty">この日の予定はありません</div>';return}
      list.forEach(x=>el.agenda.appendChild(card(x)));
    }
    function renderUpcoming(){
      const now=startDay(new Date()), limit=new Date(now);limit.setDate(now.getDate()+7);
      const list=sort(getFiltered().filter(x=>{const d=parse(x.date);return d>=now&&d<limit})).slice(0,8);
      el.upcoming.innerHTML='';if(!list.length){el.upcoming.innerHTML='<div class="empty">直近7日の予定はありません</div>';return}
      list.forEach(x=>el.upcoming.appendChild(card(x,true)));
    }
    function card(x,showDate=false){
      const node=document.createElement('article');node.className='event cat-'+(x.category||'other');
      node.innerHTML=`<div class="event-head"><div><div class="title">${esc(x.title)}</div><div class="meta">${showDate?jpDate(x.date)+' / ':''}${time(x)}</div></div><div class="tools"><button type="button" data-a="edit">編集</button><button class="danger" type="button" data-a="del">削除</button></div></div><span class="chip">${labels[x.category]||'その他'}</span>${x.memo?`<div class="memo">${esc(x.memo)}</div>`:''}`;
      node.querySelector('[data-a="edit"]').onclick=()=>edit(x.id);node.querySelector('[data-a="del"]').onclick=()=>del(x.id);return node;
    }
    function edit(idv){const x=events.find(e=>e.id===idv);if(!x)return;editing=idv;selected=x.date;view=startOfMonth(parse(x.date));el.formTitle.textContent='予定を編集';$('save').textContent='更新';el.cancel.hidden=false;el.title.value=x.title;el.date.value=x.date;el.start.value=x.start||'';el.end.value=x.end||'';el.category.value=x.category||'other';el.memo.value=x.memo||'';el.title.focus();render()}
    function stopEdit(reset=true){editing=null;el.formTitle.textContent='予定を追加';$('save').textContent='保存';el.cancel.hidden=true;if(reset)el.form.reset();el.date.value=selected;el.category.value='work'}
    function del(idv){const x=events.find(e=>e.id===idv);if(!x||!confirm(`「${x.title}」を削除しますか？`))return;events=events.filter(e=>e.id!==idv);if(editing===idv)stopEdit();save();toast('予定を削除しました');render()}
    function getFiltered(){const q=el.search.value.trim().toLowerCase(), c=el.filter.value;return events.filter(x=>(c==='all'||x.category===c)&&(!q||`${x.title} ${x.memo||''} ${labels[x.category]||''}`.toLowerCase().includes(q)))}
    function sort(a){return [...a].sort((x,y)=>x.date.localeCompare(y.date)||(x.start||'99:99').localeCompare(y.start||'99:99'))}
    function load(){try{const v=JSON.parse(localStorage.getItem(STORAGE)||'[]');return Array.isArray(v)?v:[]}catch{return[]}}function save(){localStorage.setItem(STORAGE,JSON.stringify(events))}
    function exportJson(){if(!events.length)return toast('出力する予定がありません');download(JSON.stringify(events,null,2),`schedule-${fmt(new Date())}.json`,'application/json');toast('JSONを書き出しました')}
    function exportCsv(){if(!events.length)return toast('出力する予定がありません');const rows=[['日付','開始','終了','カテゴリ','タイトル','メモ'],...sort(events).map(x=>[x.date,x.start||'',x.end||'',labels[x.category]||'その他',x.title,x.memo||''])];download('\ufeff'+rows.map(r=>r.map(v=>`"${String(v).replaceAll('"','""')}"`).join(',')).join('\n'),`schedule-${fmt(new Date())}.csv`,'text/csv;charset=utf-8');toast('CSVを書き出しました')}
    function importJson(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const data=JSON.parse(r.result);if(!Array.isArray(data))throw Error();const normalized=data.filter(x=>x&&x.title&&x.date).map(x=>({id:x.id||id(),title:String(x.title).slice(0,80),date:x.date,start:x.start||'',end:x.end||'',category:labels[x.category]?x.category:'other',memo:x.memo?String(x.memo).slice(0,600):'',createdAt:x.createdAt||new Date().toISOString()}));events=confirm('OK: 現在の予定を置き換える / キャンセル: 既存の予定に追加する')?normalized:[...events,...normalized.map(x=>events.some(y=>y.id===x.id)?{...x,id:id()}:x)];save();toast(`${normalized.length}件を読み込みました`);render()}catch{toast('JSONの読み込みに失敗しました')}finally{e.target.value=''}};r.readAsText(f)}
    function clearAll(){if(!events.length)return toast('削除する予定がありません');if(!confirm('すべての予定を削除しますか？この操作は元に戻せません。'))return;events=[];save();stopEdit();toast('すべて削除しました');render()}
    function download(content,name,type){const b=new Blob([content],{type}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download=name;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(u)}
    function fmt(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}function parse(s){const[a,b,c]=s.split('-').map(Number);return new Date(a,b-1,c)}function startOfMonth(d){return new Date(d.getFullYear(),d.getMonth(),1)}function startDay(d){return new Date(d.getFullYear(),d.getMonth(),d.getDate())}function jpDate(s){return new Intl.DateTimeFormat('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'short'}).format(parse(s))}function time(x){return x.start&&x.end?`${x.start}〜${x.end}`:x.start?`${x.start}〜`:x.end?`〜${x.end}`:'終日'}function esc(v){return String(v).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;')}function id(){return crypto.randomUUID?crypto.randomUUID():String(Date.now()+Math.random())}
    let timer;function toast(msg){clearTimeout(timer);el.toast.textContent=msg;el.toast.classList.add('show');timer=setTimeout(()=>el.toast.classList.remove('show'),2200)}
    render();
  </script>
</body>
</html>
